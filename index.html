const { useState, useEffect, useCallback } = React;

// ─── SUPABASE REST CLIENT (no external library) ──────────────────────────────
const SUPABASE_URL = "https://mqtvptumpsbxyzeuvvjn.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xdHZwdHVtcHNieHl6ZXV2dmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5OTExMTksImV4cCI6MjA5NjU2NzExOX0.9clqFQPtsg9sHd1AzsvCaVzB_UqMnt6rHoyq1w3BW1E";
const LS_KEY = "meetup_session";

// ── in-memory state ──
let _accessToken = null;
let _currentUser = null;
let _authListeners = [];

function _notifyListeners(user) { _authListeners.forEach(fn => fn(user)); }

// Try to restore a "remember me" session from localStorage
function _restoreSession() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const { access_token, user } = JSON.parse(raw);
    if (access_token && user) { _accessToken = access_token; _currentUser = user; return true; }
  } catch {}
  return false;
}

function _saveSession(token, user) {
  try { localStorage.setItem(LS_KEY, JSON.stringify({ access_token: token, user })); } catch {}
}

function _clearSession() {
  try { localStorage.removeItem(LS_KEY); } catch {}
}

// Restore on module load
_restoreSession();

const supabase = {
  auth: {
    getSession: async () => {
      if (_currentUser) return { data: { session: { user: _currentUser } } };
      return { data: { session: null } };
    },
    onAuthStateChange: (callback) => {
      _authListeners.push(callback);
      callback("INITIAL", _currentUser ? { user: _currentUser } : null);
      return { data: { subscription: { unsubscribe: () => { _authListeners = _authListeners.filter(fn => fn !== callback); } } } };
    },
    signInWithPassword: async ({ email, password, rememberMe = false }) => {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) return { data: null, error: { message: data.error_description || data.msg || "אימייל או סיסמה שגויים" } };
      _accessToken = data.access_token;
      _currentUser = data.user;
      if (rememberMe) _saveSession(data.access_token, data.user);
      _notifyListeners(_currentUser);
      return { data: { user: data.user }, error: null };
    },
    signUp: async ({ email, password }) => {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) return { data: null, error: { message: data.error_description || data.msg || "שגיאה בהרשמה" } };
      // With email confirmation ON: data.user exists but no access_token yet — that's expected
      return { data: { user: data.user }, error: null };
    },
    resetPasswordForEmail: async (email) => {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY },
        body: JSON.stringify({ email }),
      });
      if (!res.ok) { const d = await res.json(); return { error: { message: d.error_description || "שגיאה בשליחת מייל" } }; }
      return { error: null };
    },
    signOut: async () => {
      if (_accessToken) {
        await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
          method: "POST",
          headers: { "Authorization": `Bearer ${_accessToken}`, "apikey": SUPABASE_ANON_KEY },
        }).catch(() => {});
      }
      _accessToken = null; _currentUser = null;
      _clearSession();
      _notifyListeners(null);
      return { error: null };
    },
  },
  from: (table) => ({
    select: (cols = "*") => ({
      eq: (col, val) => ({
        single: async () => {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=${cols}&${col}=eq.${val}&limit=1`, {
            headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${_accessToken || SUPABASE_ANON_KEY}` },
          });
          const arr = await res.json();
          return { data: Array.isArray(arr) ? arr[0] || null : null, error: res.ok ? null : arr };
        },
      }),
    }),
    upsert: async (row) => {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${_accessToken || SUPABASE_ANON_KEY}`,
          "Prefer": "resolution=merge-duplicates",
        },
        body: JSON.stringify(row),
      });
      return { error: res.ok ? null : await res.json() };
    },
  }),
};

// ─── AUTH SCREEN ─────────────────────────────────────────────────────────────
function ResetPasswordScreen({ onDone }) {
  const [password, setPassword] = useState("");
  const [confirm, setConfirm] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [done, setDone] = useState(false);

  const tc = { bg: "#020817", bgCard: "#0f172a", bgInput: "#1e293b", border: "#1e293b", text: "#f1f5f9", textSub: "#64748b" };

  const handleReset = async () => {
    if (password.length < 6) { setError("סיסמה חייבת להכיל לפחות 6 תווים"); return; }
    if (password !== confirm) { setError("הסיסמאות לא תואמות"); return; }
    setLoading(true); setError("");
    // Extract access_token from URL hash
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.replace("#", "?"));
    const token = params.get("access_token");
    if (!token) { setError("קישור לא תקין — נסה שוב מהאימייל"); setLoading(false); return; }
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${token}` },
      body: JSON.stringify({ password }),
    });
    setLoading(false);
    if (!res.ok) { setError("שגיאה בעדכון הסיסמה, נסה שוב"); return; }
    setDone(true);
    setTimeout(() => { window.location.hash = ""; onDone(); }, 2500);
  };

  return (
    <div style={{ minHeight:"100vh", background:tc.bg, display:"flex", alignItems:"center", justifyContent:"center", padding:24, fontFamily:"'Segoe UI',sans-serif" }}>
      <div style={{ width:"100%", maxWidth:380, background:tc.bgCard, borderRadius:20, border:`1px solid ${tc.border}`, padding:"40px 28px", textAlign:"center", direction:"rtl" }}>
        {done ? (
          <>
            <div style={{ fontSize:52, marginBottom:16 }}>✅</div>
            <div style={{ color:"#22c55e", fontWeight:800, fontSize:20 }}>הסיסמה עודכנה!</div>
            <div style={{ color:tc.textSub, fontSize:14, marginTop:10 }}>מעביר אותך לכניסה...</div>
          </>
        ) : (
          <>
            <div style={{ fontSize:44, marginBottom:12 }}>🔑</div>
            <div style={{ color:tc.text, fontWeight:800, fontSize:20, marginBottom:6 }}>איפוס סיסמה</div>
            <div style={{ color:tc.textSub, fontSize:13, marginBottom:24 }}>הכנס סיסמה חדשה לחשבונך</div>
            {error && <div style={{ background:"#450a0a", border:"1px solid #7f1d1d", borderRadius:10, padding:"10px 14px", marginBottom:14, color:"#ef4444", fontSize:13 }}>⚠️ {error}</div>}
            <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:16 }}>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="סיסמה חדשה (מינימום 6 תווים)"
                style={{ padding:"13px 16px", background:tc.bgInput, border:`1px solid ${tc.border}`, borderRadius:12, color:tc.text, fontSize:15, direction:"rtl" }} />
              <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="אימות סיסמה"
                style={{ padding:"13px 16px", background:tc.bgInput, border:`1px solid ${tc.border}`, borderRadius:12, color:tc.text, fontSize:15, direction:"rtl" }} />
            </div>
            <button onClick={handleReset} disabled={loading||!password||!confirm}
              style={{ width:"100%", padding:14, background:password&&confirm?"linear-gradient(135deg,#3b82f6,#8b5cf6)":tc.bgInput, border:"none", borderRadius:12, color:password&&confirm?"#fff":tc.textSub, fontWeight:700, fontSize:15, cursor:password&&confirm?"pointer":"not-allowed" }}>
              {loading ? "מעדכן..." : "עדכן סיסמה"}
            </button>
          </>
        )}
      </div>
    </div>
  );
}
    function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [fullName, setFullName] = useState("");
  const [rememberMe, setRememberMe] = useState(false);
  const [showPassword, setShowPassword] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [forgotSent, setForgotSent] = useState(false);

  const tc = { bg: "#020817", bgCard: "#0f172a", bgInput: "#1e293b", border: "#1e293b", text: "#f1f5f9", textSub: "#64748b", textMuted: "#475569" };

  const handleLogin = async () => {
    setError(""); setLoading(true);
    const { data, error: err } = await supabase.auth.signInWithPassword({ email, password, rememberMe });
    setLoading(false);
    if (err) { setError(err.message); return; }
    onAuth(data.user);
  };

  const handleRegister = async () => {
    setError(""); setLoading(true);
    if (!fullName.trim()) { setError("נא להכניס שם מלא"); setLoading(false); return; }
    if (password.length < 6) { setError("הסיסמה חייבת להכיל לפחות 6 תווים"); setLoading(false); return; }
    const { data, error: err } = await supabase.auth.signUp({ email, password });
    if (err) {
      const msg = err.message || "";
      if (msg.toLowerCase().includes("already") || msg.toLowerCase().includes("registered")) {
        setError("אימייל זה כבר רשום — נסה להתחבר");
        setMode("login");
      } else {
        setError(msg || "שגיאה בהרשמה");
      }
      setLoading(false); return;
    }
    // Supabase sometimes returns a fake user without access_token when email already exists
    if (!data?.user?.id) {
      setError("אימייל זה כבר רשום — נסה להתחבר");
      setMode("login");
      setLoading(false); return;
    }
    await supabase.from("profiles").upsert({ id: data.user.id, full_name: fullName.trim(), email });
    const { data: loginData, error: loginErr } = await supabase.auth.signInWithPassword({ email, password, rememberMe });
    setLoading(false);
    if (loginErr) { setError("נרשמת! כעת התחבר."); setMode("login"); return; }
    onAuth(loginData.user);
  };

  const handleForgot = async () => {
    setError(""); setLoading(true);
    const { error: err } = await supabase.auth.resetPasswordForEmail(email);
    setLoading(false);
    if (err) { setError(err.message); return; }
    setForgotSent(true);
  };

  const inputStyle = {
    flex: 1, padding: "13px 16px", background: tc.bgInput, border: `1px solid ${tc.border}`,
    borderRadius: 12, color: tc.text, fontSize: 15, direction: "ltr", boxSizing: "border-box", outline: "none",
  };
  const btnPrimary = (active) => ({
    width: "100%", padding: "14px", marginTop: 8, border: "none", borderRadius: 12, fontWeight: 700, fontSize: 15,
    cursor: active ? "pointer" : "not-allowed",
    background: active ? "linear-gradient(135deg,#3b82f6,#8b5cf6)" : tc.bgInput,
    color: active ? "#fff" : tc.textSub,
  });

  if (forgotSent) return (
    <div style={{ minHeight: "100vh", background: tc.bg, display: "flex", alignItems: "center", justifyContent: "center", padding: 24, fontFamily: "'Segoe UI', sans-serif" }}>
      <div style={{ width: "100%", maxWidth: 380, background: tc.bgCard, borderRadius: 20, border: `1px solid ${tc.border}`, padding: "40px 28px", textAlign: "center", direction: "rtl" }}>
        <div style={{ fontSize: 52, marginBottom: 16 }}>🔑</div>
        <div style={{ color: "#f1f5f9", fontWeight: 800, fontSize: 20, marginBottom: 10 }}>נשלח!</div>
        <div style={{ color: tc.textSub, fontSize: 14, lineHeight: 1.7, marginBottom: 24 }}>
          קישור לאיפוס סיסמה נשלח לכתובת<br />
          <span style={{ color: "#60a5fa", fontWeight: 600 }}>{email}</span>
        </div>
        <button onClick={() => { setForgotSent(false); setMode("login"); }} style={{ ...btnPrimary(true), marginTop: 0 }}>
          ← חזרה לכניסה
        </button>
      </div>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: tc.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "24px", fontFamily: "'Segoe UI', Tahoma, sans-serif" }}>
      <div style={{ marginBottom: 32, textAlign: "center" }}>
        <div style={{ color: "#3b82f6", fontWeight: 900, fontSize: 38, letterSpacing: 2 }}>MeetUp</div>
        <div style={{ color: tc.textSub, fontSize: 13, marginTop: 6 }}>{mode === "forgot" ? "איפוס סיסמה" : "ברוך הבא"}</div>
      </div>

      <div style={{ width: "100%", maxWidth: 380, background: tc.bgCard, borderRadius: 20, border: `1px solid ${tc.border}`, padding: "28px 24px", boxShadow: "0 8px 40px rgba(0,0,0,0.5)", direction: "rtl" }}>
        {mode !== "forgot" && (
          <div style={{ display: "flex", gap: 4, marginBottom: 24, background: tc.bgInput, borderRadius: 12, padding: 4 }}>
            {[["login","כניסה"],["register","הרשמה"]].map(([m, label]) => (
              <button key={m} onClick={() => { setMode(m); setError(""); setShowPassword(false); }}
                style={{ flex: 1, padding: "10px", borderRadius: 9, border: "none", fontWeight: 700, fontSize: 14, cursor: "pointer",
                  background: mode === m ? "linear-gradient(135deg,#3b82f6,#8b5cf6)" : "transparent",
                  color: mode === m ? "#fff" : tc.textSub }}>
                {label}
              </button>
            ))}
          </div>
        )}

        {error && (
          <div style={{ background: "#450a0a", border: "1px solid #7f1d1d", borderRadius: 10, padding: "11px 14px", marginBottom: 16, color: "#ef4444", fontSize: 13, textAlign: "center" }}>
            ⚠️ {error}
          </div>
        )}

        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {mode === "register" && (
            <div>
              <label style={{ color: tc.textSub, fontSize: 12, display: "block", marginBottom: 5 }}>שם מלא</label>
              <input value={fullName} onChange={e => setFullName(e.target.value)} placeholder="ישראל ישראלי"
                style={{ ...inputStyle, width: "100%", direction: "rtl" }} />
            </div>
          )}

          <div>
            <label style={{ color: tc.textSub, fontSize: 12, display: "block", marginBottom: 5 }}>אימייל</label>
            <input value={email} onChange={e => setEmail(e.target.value)} type="email" placeholder="you@example.com"
              style={{ ...inputStyle, width: "100%" }} />
          </div>

          {mode !== "forgot" && (
            <div>
              <label style={{ color: tc.textSub, fontSize: 12, display: "block", marginBottom: 5 }}>סיסמה</label>
              <div style={{ display: "flex", gap: 0, background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 12, overflow: "hidden" }}>
                <input value={password} onChange={e => setPassword(e.target.value)}
                  type={showPassword ? "text" : "password"} placeholder="••••••••"
                  style={{ ...inputStyle, border: "none", borderRadius: 0, background: "transparent" }}
                  onKeyDown={e => e.key === "Enter" && mode === "login" && handleLogin()} />
                <button onClick={() => setShowPassword(v => !v)}
                  style={{ padding: "0 14px", background: "transparent", border: "none", cursor: "pointer", color: tc.textSub, fontSize: 16, flexShrink: 0 }}>
                  {showPassword ? "🙈" : "👁️"}
                </button>
              </div>
            </div>
          )}

          {mode === "login" && (
            <div onClick={() => setRememberMe(v => !v)}
              style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", userSelect: "none" }}>
              <div style={{ width: 20, height: 20, borderRadius: 6, border: `2px solid ${rememberMe ? "#3b82f6" : tc.border}`,
                background: rememberMe ? "#3b82f6" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.15s" }}>
                {rememberMe && <span style={{ color: "#fff", fontSize: 13, lineHeight: 1 }}>✓</span>}
              </div>
              <span style={{ color: tc.textSub, fontSize: 13 }}>זכור אותי</span>
            </div>
          )}

          {mode === "login" && <button onClick={handleLogin} disabled={loading || !email || !password} style={btnPrimary(!loading && email && password)}>{loading ? "מתחבר..." : "כניסה"}</button>}
          {mode === "register" && <button onClick={handleRegister} disabled={loading || !email || !password || !fullName} style={btnPrimary(!loading && email && password && fullName)}>{loading ? "נרשם..." : "הירשם"}</button>}
          {mode === "forgot" && <button onClick={handleForgot} disabled={loading || !email} style={btnPrimary(!loading && email)}>{loading ? "שולח..." : "שלח קישור איפוס"}</button>}
        </div>

        <div style={{ marginTop: 18, textAlign: "center" }}>
          {mode === "login" && <button onClick={() => { setMode("forgot"); setError(""); }} style={{ background: "none", border: "none", color: "#60a5fa", fontSize: 13, cursor: "pointer" }}>שכחתי סיסמה</button>}
          {mode === "forgot" && <button onClick={() => { setMode("login"); setError(""); }} style={{ background: "none", border: "none", color: "#60a5fa", fontSize: 13, cursor: "pointer" }}>← חזרה לכניסה</button>}
        </div>
      </div>
    </div>
  );
}

// ─── SHARED COMPONENTS ───────────────────────────────────────────────────────
function ReliabilityGauge({ percent, size = "md" }) {
  const color = percent >= 80 ? "#22c55e" : percent >= 60 ? "#f59e0b" : "#ef4444";
  const r = size === "lg" ? 52 : 36;
  const sw = size === "lg" ? 12 : 10;
  const w = r * 2 + sw + 2;
  const h = r + sw / 2 + 2;
  const cx = w / 2, cy = r + sw / 2 + 1;
  const circ = Math.PI * r;
  const offset = circ - (percent / 100) * circ;
  const fs = size === "lg" ? 20 : 14;
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
        <path d={`M ${sw / 2 + 1} ${cy} A ${r} ${r} 0 0 1 ${w - sw / 2 - 1} ${cy}`}
          fill="none" stroke="#1e293b" strokeWidth={sw} strokeLinecap="round" />
        <path d={`M ${sw / 2 + 1} ${cy} A ${r} ${r} 0 0 1 ${w - sw / 2 - 1} ${cy}`}
          fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={offset}
          style={{ transition: "stroke-dashoffset 0.6s ease" }} />
      </svg>
      <span style={{ marginTop: -(sw / 2 + fs * 0.4), fontSize: fs, fontWeight: 800, color }}>{percent}%</span>
    </div>
  );
}

}

// ─── CHAT ────────────────────────────────────────────────────────────────────
function ChatView({ name, initial, messages: initMsgs, onBack, gradient }) {
  const [msgs, setMsgs] = useState(initMsgs || []);
  const [input, setInput] = useState("");
  const send = () => {
    if (!input.trim()) return;
    setMsgs(prev => [...prev, { from: "me", text: input.trim() }]);
    setInput("");
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 140px)", direction: "rtl" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, paddingBottom: 14, borderBottom: "1px solid #1e293b" }}>
        <button onClick={onBack} style={{ background: "none", border: "none", color: "#60a5fa", cursor: "pointer", fontSize: 18, padding: 0 }}>←</button>
        <Avatar initial={initial} size={38} gradient={gradient} />
        <div style={{ color: "#f1f5f9", fontWeight: 700, fontSize: 16 }}>{name}</div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 10, paddingBottom: 8 }}>
        {msgs.length === 0 && <div style={{ color: "#334155", textAlign: "center", marginTop: 40, fontSize: 13 }}>אין הודעות עדיין</div>}
        {msgs.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.from === "me" ? "flex-start" : "flex-end" }}>
            <div style={{
              maxWidth: "75%", padding: "10px 14px", borderRadius: m.from === "me" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
              background: m.from === "me" ? "linear-gradient(135deg,#1e40af,#7c3aed)" : "#1e293b",
              color: "#f1f5f9", fontSize: 14, lineHeight: 1.5,
            }}>{m.text}</div>
          </div>
        ))}
      </div>
      <div style={{ display: "flex", gap: 8, paddingTop: 12, borderTop: "1px solid #1e293b" }}>
        <input value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && send()}
          placeholder="כתוב הודעה..."
          style={{ flex: 1, padding: "11px 14px", background: "#1e293b", border: "1px solid #334155", borderRadius: 12, color: "#f1f5f9", fontSize: 14, direction: "rtl" }} />
        <button onClick={send} style={{ padding: "11px 18px", background: "linear-gradient(135deg,#3b82f6,#8b5cf6)", border: "none", borderRadius: 12, color: "#fff", fontWeight: 700, cursor: "pointer" }}>שלח</button>
      </div>
    </div>
  );
}

// ─── CREATE MEETING ───────────────────────────────────────────────────────────
function CreateMeetingPage({ language, tc }) {
  const t = TRANSLATIONS[language] || TRANSLATIONS["עברית"];
  const dir = language === "English" ? "ltr" : "rtl";
  const MEETING_TYPES_L = getMeetingTypes(language);

  const [step, setStep] = useState(1);
  const [selectedType, setSelectedType] = useState(null);
  const [customType, setCustomType] = useState("");
  const [date, setDate] = useState("");
  const [time, setTime] = useState("");
  const [location, setLocation] = useState("");
  const [locationConfirmed, setLocationConfirmed] = useState(false);
  const [selectedFriends, setSelectedFriends] = useState([]);
  const [selectedGroups, setSelectedGroups] = useState([]);
  const [sent, setSent] = useState(false);

  const meetingLabel = selectedType === "other" ? customType : MEETING_TYPES_L.find(m => m.id === selectedType)?.label;
  const toggleFriend = id => setSelectedFriends(p => p.includes(id) ? p.filter(f => f !== id) : [...p, id]);
  const toggleGroup = id => {
    const g = GROUPS.find(g => g.id === id);
    const adding = !selectedGroups.includes(id);
    setSelectedGroups(p => adding ? [...p, id] : p.filter(x => x !== id));
    setSelectedFriends(p => adding ? [...new Set([...p, ...g.members])] : p.filter(f => !g.members.includes(f)));
  };

  if (sent) return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "60vh", gap: 16, direction: dir }}>
      <div style={{ fontSize: 60 }}>🎉</div>
      <div style={{ color: "#22c55e", fontSize: 22, fontWeight: 800 }}>{t.meetingSent}</div>
      <div style={{ color: "#64748b", fontSize: 14 }}>{t.savedCalendar}</div>
      <button onClick={() => { setSent(false); setStep(1); setSelectedType(null); setDate(""); setTime(""); setLocation(""); setLocationConfirmed(false); setSelectedFriends([]); setSelectedGroups([]); setCustomType(""); }}
        style={{ marginTop: 8, padding: "12px 32px", background: "linear-gradient(135deg,#3b82f6,#8b5cf6)", border: "none", borderRadius: 12, color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer" }}>
        {t.newMeeting}
      </button>
    </div>
  );

  return (
    <div style={{ maxWidth: 520, margin: "0 auto", direction: dir }}>
      <h2 style={{ color: tc.text, fontWeight: 800, fontSize: 22, marginBottom: 20 }}>{t.createMeetingTitle}</h2>
      <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
        {[t.typeStep, t.dateStep, t.locationStep, t.friendsStep].map((s, i) => (
          <div key={i} style={{ flex: 1, textAlign: "center" }}>
            <div style={{ height: 4, borderRadius: 4, marginBottom: 6, background: step > i + 1 ? "#22c55e" : step === i + 1 ? "#3b82f6" : tc.bgInput, transition: "background 0.3s" }} />
            <span style={{ fontSize: 11, color: step >= i + 1 ? tc.textSub : tc.textMuted }}>{s}</span>
          </div>
        ))}
      </div>

      {step === 1 && (
        <div>
          <p style={{ color: tc.textSub, marginBottom: 14, fontSize: 14 }}>{t.chooseType}</p>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
            {MEETING_TYPES_L.map(mt => (
              <button key={mt.id} onClick={() => setSelectedType(mt.id)}
                style={{ padding: "14px 6px", borderRadius: 12, border: `2px solid ${selectedType === mt.id ? "#3b82f6" : tc.border}`, background: selectedType === mt.id ? "#1e3a5f" : tc.bgCard, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, transition: "all 0.15s" }}>
                <span style={{ fontSize: 22 }}>{mt.icon}</span>
                <span style={{ color: selectedType === mt.id ? "#60a5fa" : tc.textSub, fontSize: 11, fontWeight: 600 }}>{mt.label}</span>
              </button>
            ))}
          </div>
          {selectedType === "other" && (
            <input value={customType} onChange={e => setCustomType(e.target.value)} placeholder={t.enterMeetingName}
              style={{ marginTop: 14, width: "100%", padding: "12px 16px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 10, color: tc.text, fontSize: 14, direction: dir, boxSizing: "border-box" }} />
          )}
          <button disabled={!selectedType || (selectedType === "other" && !customType)} onClick={() => setStep(2)}
            style={{ marginTop: 18, width: "100%", padding: "14px", background: selectedType ? "linear-gradient(135deg,#3b82f6,#8b5cf6)" : tc.bgInput, border: "none", borderRadius: 12, color: selectedType ? "#fff" : tc.textMuted, fontWeight: 700, fontSize: 15, cursor: selectedType ? "pointer" : "not-allowed" }}>{t.next}</button>
        </div>
      )}

      {step === 2 && (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <p style={{ color: tc.textSub, fontSize: 14 }}>{t.dateTime}: <strong style={{ color: "#60a5fa" }}>{meetingLabel}</strong></p>
          <div>
            <label style={{ color: tc.textMuted, fontSize: 12, display: "block", marginBottom: 6 }}>{t.dateLabel}</label>
            <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{ width: "100%", padding: "12px 16px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 10, color: tc.text, fontSize: 14, boxSizing: "border-box" }} />
          </div>
          <div>
            <label style={{ color: tc.textMuted, fontSize: 12, display: "block", marginBottom: 6 }}>{t.timeLabel}</label>
            <input type="time" value={time} onChange={e => setTime(e.target.value)} style={{ width: "100%", padding: "12px 16px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 10, color: tc.text, fontSize: 14, boxSizing: "border-box" }} />
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => setStep(1)} style={{ flex: 1, padding: "13px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 12, color: tc.textSub, fontWeight: 600, cursor: "pointer" }}>{t.back}</button>
            <button disabled={!date || !time} onClick={() => setStep(3)} style={{ flex: 2, padding: "13px", background: date && time ? "linear-gradient(135deg,#3b82f6,#8b5cf6)" : tc.bgInput, border: "none", borderRadius: 12, color: date && time ? "#fff" : tc.textMuted, fontWeight: 700, cursor: date && time ? "pointer" : "not-allowed" }}>{t.next}</button>
          </div>
        </div>
      )}

      {step === 3 && (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <p style={{ color: tc.textSub, fontSize: 14 }}>{t.chooseLocation}</p>
          <input placeholder={t.enterLocation} value={location} onInput={e => { setLocation(e.target.value); setLocationConfirmed(false); }} onChange={() => {}}
            style={{ width: "100%", padding: "12px 16px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 10, color: tc.text, fontSize: 14, direction: dir, boxSizing: "border-box" }} />
          {location && !locationConfirmed && (
            <div style={{ display: "flex", gap: 10 }}>
              <a href={`https://waze.com/ul?q=${encodeURIComponent(location)}`} target="_blank" rel="noreferrer"
                style={{ flex: 1, padding: "11px", background: "#1a3a5c", border: "1px solid #2d6fa8", borderRadius: 10, color: "#60a5fa", fontWeight: 600, fontSize: 13, textAlign: "center", textDecoration: "none" }}>🔵 Waze</a>
              <a href={`https://maps.google.com/?q=${encodeURIComponent(location)}`} target="_blank" rel="noreferrer"
                style={{ flex: 1, padding: "11px", background: "#1a3a5c", border: "1px solid #2d6fa8", borderRadius: 10, color: "#60a5fa", fontWeight: 600, fontSize: 13, textAlign: "center", textDecoration: "none" }}>🗺️ Maps</a>
            </div>
          )}
          {location && (
            <button onClick={() => setLocationConfirmed(true)}
              style={{ padding: "13px", background: locationConfirmed ? "#14532d" : tc.bgInput, border: `2px solid ${locationConfirmed ? "#22c55e" : tc.border}`, borderRadius: 12, color: locationConfirmed ? "#22c55e" : tc.textSub, fontWeight: 700, fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
              {locationConfirmed ? <>✅ {t.locationChosen}: {location}</> : t.confirmLocation}
            </button>
          )}
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => setStep(2)} style={{ flex: 1, padding: "13px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 12, color: tc.textSub, fontWeight: 600, cursor: "pointer" }}>{t.back}</button>
            <button disabled={!locationConfirmed} onClick={() => setStep(4)} style={{ flex: 2, padding: "13px", background: locationConfirmed ? "linear-gradient(135deg,#3b82f6,#8b5cf6)" : tc.bgInput, border: "none", borderRadius: 12, color: locationConfirmed ? "#fff" : tc.textMuted, fontWeight: 700, cursor: locationConfirmed ? "pointer" : "not-allowed" }}>{t.next}</button>
          </div>
        </div>
      )}

      {step === 4 && (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <p style={{ color: tc.textSub, fontSize: 14 }}>{t.chooseFriends}</p>
          <div style={{ color: tc.textMuted, fontSize: 12 }}>{t.groupsLabel}</div>
          {GROUPS.map(g => (
            <button key={g.id} onClick={() => toggleGroup(g.id)}
              style={{ padding: "11px 14px", borderRadius: 10, border: `2px solid ${selectedGroups.includes(g.id) ? "#3b82f6" : tc.border}`, background: selectedGroups.includes(g.id) ? "#1e3a5f" : tc.bgCard, color: selectedGroups.includes(g.id) ? "#60a5fa" : tc.textSub, cursor: "pointer", textAlign: dir === "ltr" ? "left" : "right", fontWeight: 600, fontSize: 14, display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 18 }}>👥</span> {g.name}
              <span style={{ marginRight: dir === "rtl" ? "auto" : 0, marginLeft: dir === "ltr" ? "auto" : 0, fontSize: 12, opacity: 0.6 }}>{g.members.length} {t.members}</span>
            </button>
          ))}
          <div style={{ color: tc.textMuted, fontSize: 12, marginTop: 4 }}>{t.friendsLabel}</div>
          {FRIENDS.map(f => (
            <button key={f.id} onClick={() => toggleFriend(f.id)}
              style={{ padding: "10px 12px", borderRadius: 10, border: `2px solid ${selectedFriends.includes(f.id) ? "#3b82f6" : tc.border}`, background: selectedFriends.includes(f.id) ? "#1e3a5f" : tc.bgCard, cursor: "pointer", display: "flex", alignItems: "center", gap: 12 }}>
              <Avatar initial={f.initial} size={32} />
              <span style={{ color: selectedFriends.includes(f.id) ? "#60a5fa" : tc.textSub, fontWeight: 600, fontSize: 14 }}>{f.name}</span>
              {selectedFriends.includes(f.id) && <span style={{ marginRight: dir === "rtl" ? "auto" : 0, marginLeft: dir === "ltr" ? "auto" : 0, color: "#22c55e" }}>✓</span>}
            </button>
          ))}
          <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
            <button onClick={() => setStep(3)} style={{ flex: 1, padding: "13px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 12, color: tc.textSub, fontWeight: 600, cursor: "pointer" }}>{t.back}</button>
            <button disabled={selectedFriends.length === 0} onClick={() => setSent(true)}
              style={{ flex: 2, padding: "13px", background: selectedFriends.length > 0 ? "linear-gradient(135deg,#22c55e,#16a34a)" : tc.bgInput, border: "none", borderRadius: 12, color: selectedFriends.length > 0 ? "#fff" : tc.textMuted, fontWeight: 700, fontSize: 14, cursor: selectedFriends.length > 0 ? "pointer" : "not-allowed" }}>
              {t.sendFriends}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── MEETINGS ────────────────────────────────────────────────────────────────
function MeetingsPage({ language, tc }) {

  const [tab, setTab] = useState("mine");

    <div style={{ direction: dir }}>

      <div style={{ display: "flex", gap: 0, marginBottom: 22, background: tc.bgInput, borderRadius: 12, padding: 4 }}>
        {[["mine", t.myMeetingsList], ["invited", t.invited]].map(([id, label]) => (
          <button key={id} onClick={() => setTab(id)}
            style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 14, background: tab === id ? "#3b82f6" : "transparent", color: tab === id ? "#fff" : tc.textSub, transition: "all 0.2s" }}>
            {label}

        ))}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {meetings.map(m => (
          <div key={m.id} style={{ background: tc.bgCard, border: `1px solid ${tc.border}`, borderRadius: 14, padding: "16px 18px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
              <span style={{ fontSize: 28 }}>{m.icon}</span>
              <div>
                <div style={{ color: tc.text, fontWeight: 700, fontSize: 16 }}>{m.type}</div>
                <div style={{ color: tc.textSub, fontSize: 12 }}>{tab === "invited" ? `${t.createdBy} ${m.organizer}` : (m.invitees || []).join(", ")}</div>
              </div>
              <span style={{ marginRight: "auto", padding: "4px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700, background: m.status === "confirmed" ? "#14532d" : m.status === "accepted" ? "#1e3a5f" : "#451a03", color: m.status === "confirmed" ? "#22c55e" : m.status === "accepted" ? "#60a5fa" : "#f59e0b" }}>
                {m.status === "confirmed" ? t.confirmed : m.status === "accepted" ? t.accepted : t.pending}
              </span>
            </div>
            <div style={{ display: "flex", gap: 16 }}>
              <div style={{ color: tc.textSub, fontSize: 13 }}>📅 {m.date} • {m.time}</div>
              <div style={{ color: tc.textSub, fontSize: 13 }}>📍 {m.location}</div>
            </div>
            {tab === "invited" && m.status === "pending" && (
              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <button style={{ flex: 1, padding: "9px", background: "#14532d", border: "none", borderRadius: 8, color: "#22c55e", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>{t.confirm}</button>
                <button style={{ flex: 1, padding: "9px", background: "#450a0a", border: "none", borderRadius: 8, color: "#ef4444", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>{t.reject}</button>
                <button style={{ flex: 1, padding: "9px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 8, color: tc.textSub, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>{t.addCalendar}</button>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── FRIENDS ─────────────────────────────────────────────────────────────────
function FriendsPage({ navigate, language, tc }) {
  const t = TRANSLATIONS[language] || TRANSLATIONS["עברית"];
  const dir = language === "English" ? "ltr" : "rtl";
  const [tab, setTab] = useState("list"); // "list" | "add"
  const [friendCode, setFriendCode] = useState("");
  const [codeResult, setCodeResult] = useState(null); // null | "sent" | "notfound"
  const [contactsStatus, setContactsStatus] = useState(null); // null | "loading" | "done" | "denied"
  const [contactMatches, setContactMatches] = useState([]);
  const [pendingRequests] = useState([
    { id: 101, name: "רועי בן דוד", initial: "ר", mutualMeetings: 2, sports: ["כדורגל"] },
  ]);

  // Simulate suggestions based on shared interests + location
  const SUGGESTIONS = [
    { id: 201, name: "נועה קץ", initial: "נ", distance: "0.8 ק״מ", sports: ["בית קפה", "טניס"], mutual: 1 },
    { id: 202, name: "יונתן שפירא", initial: "י", distance: "1.2 ק״מ", sports: ["כדורגל", "חדר כושר"], mutual: 3 },
    { id: 203, name: "מאיה לוינסון", initial: "מ", distance: "2.1 ק״מ", sports: ["מסעדה", "ערב משחקים"], mutual: 0 },
    { id: 204, name: "אורי פרידמן", initial: "א", distance: "3.5 ק״מ", sports: ["כדורסל", "פינג פונג"], mutual: 2 },
  ];

  const [sentRequests, setSentRequests] = useState([]);
  const [filterSuggestions, setFilterSuggestions] = useState("הכל"); // "הכל" | "קרבה" | "נושאים"

  const handleSendCode = () => {
    if (!friendCode.trim()) return;
    // Simulate: if code is 6 chars → sent, else not found
    if (friendCode.trim().length === 6) {
      setCodeResult("sent");
    } else {
      setCodeResult("notfound");
    }
  };

  const handleRequestContacts = async () => {
    setContactsStatus("loading");
    try {
      const contacts = await navigator.contacts?.select(["name", "tel"], { multiple: true });
      if (contacts && contacts.length > 0) {
        // Simulate finding matches
        setTimeout(() => {
          setContactMatches([
            { id: 301, name: contacts[0]?.name?.[0] || "חבר מהקשרים", initial: (contacts[0]?.name?.[0]?.[0]) || "ח", phone: contacts[0]?.tel?.[0] || "" },
          ]);
          setContactsStatus("done");
        }, 800);
      } else {
        setContactsStatus("done");
        setContactMatches([]);
      }
    } catch {
      // Contacts API not supported or denied
      setContactsStatus("denied");
    }
  };

  const filteredSuggestions = filterSuggestions === "קרבה"
    ? [...SUGGESTIONS].sort((a, b) => parseFloat(a.distance) - parseFloat(b.distance))
    : filterSuggestions === "נושאים"
    ? [...SUGGESTIONS].sort((a, b) => b.mutual - a.mutual)
    : SUGGESTIONS;

  return (
    <div style={{ direction: dir }}>
      <h2 style={{ color: tc.text, fontWeight: 800, fontSize: 22, marginBottom: 16 }}>{t.friends}</h2>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 0, marginBottom: 20, background: tc.bgInput, borderRadius: 12, padding: 4 }}>
        {[["list", "👥 חברים"], ["add", "➕ הוסף חברים"]].map(([id, label]) => (
          <button key={id} onClick={() => setTab(id)}
            style={{ flex: 1, padding: "9px 4px", borderRadius: 9, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13,
              background: tab === id ? "linear-gradient(135deg,#3b82f6,#8b5cf6)" : "transparent",
              color: tab === id ? "#fff" : tc.textSub, transition: "all 0.2s" }}>
            {label}
          </button>
        ))}
      </div>

      {/* TAB: Friends List */}
      {tab === "list" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {/* Pending incoming requests */}
          {pendingRequests.length > 0 && (
            <div style={{ background: "#1e3a5f", border: "1px solid #3b82f640", borderRadius: 14, padding: "14px 16px", marginBottom: 4 }}>
              <div style={{ color: "#60a5fa", fontWeight: 700, fontSize: 13, marginBottom: 10 }}>📨 בקשות חברות ממתינות</div>
              {pendingRequests.map(req => (
                <div key={req.id} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <Avatar initial={req.initial} size={40} />
                  <div style={{ flex: 1 }}>
                    <div style={{ color: tc.text, fontWeight: 700, fontSize: 14 }}>{req.name}</div>
                    <div style={{ color: tc.textSub, fontSize: 12 }}>{req.mutualMeetings} פגישות משותפות</div>
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button style={{ padding: "6px 12px", background: "#14532d", border: "none", borderRadius: 8, color: "#22c55e", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>✓ אשר</button>
                    <button style={{ padding: "6px 10px", background: "#450a0a", border: "none", borderRadius: 8, color: "#ef4444", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>✕</button>
                  </div>
                </div>
              ))}
            </div>
          )}
          {FRIENDS.map(f => {
            const rel = Math.round(((f.meetings - f.cancelled) / f.meetings) * 100);
            return (
              <button key={f.id} onClick={() => navigate("friendProfile", { friend: f })}
                style={{ background: tc.bgCard, border: `1px solid ${tc.border}`, borderRadius: 14, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14, cursor: "pointer", textAlign: "right", width: "100%" }}>
                <Avatar initial={f.initial} size={44} />
                <div style={{ flex: 1 }}>
                  <div style={{ color: tc.text, fontWeight: 700, fontSize: 15 }}>{f.name}</div>
                  <div style={{ color: tc.textSub, fontSize: 12, marginTop: 2 }}>{f.mutualMeetings} {t.mutualMeetings}</div>
                </div>
                <div style={{ textAlign: "center" }}>
                  <div style={{ color: rel >= 80 ? "#22c55e" : rel >= 60 ? "#f59e0b" : "#ef4444", fontWeight: 800, fontSize: 16 }}>{rel}%</div>
                  <div style={{ color: tc.textMuted, fontSize: 10 }}>{t.attendance}</div>
                </div>
                <span style={{ color: tc.textMuted, fontSize: 18 }}>‹</span>
              </button>
            );
          })}
        </div>
      )}

      {/* TAB: Add Friends (includes search by code/contacts + suggestions) */}
      {tab === "add" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {/* My own code */}
          <div style={{ background: tc.bgCard, border: `1px solid ${tc.border}`, borderRadius: 14, padding: "18px 16px", textAlign: "center" }}>
            <div style={{ color: tc.textSub, fontSize: 12, marginBottom: 8 }}>הקוד שלך לשיתוף</div>
            <div style={{ color: "#60a5fa", fontWeight: 900, fontSize: 28, letterSpacing: 6, fontFamily: "monospace", marginBottom: 10 }}>AB3K9Z</div>
            <button onClick={() => { try { navigator.share?.({ text: "הצטרף אליי ב-MeetUp! הקוד שלי: AB3K9Z" }); } catch {} }}
              style={{ padding: "9px 22px", background: "linear-gradient(135deg,#3b82f6,#8b5cf6)", border: "none", borderRadius: 10, color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
              📤 שתף קוד
            </button>
          </div>

          {/* Enter friend code */}
          <div style={{ background: tc.bgCard, border: `1px solid ${tc.border}`, borderRadius: 14, padding: "16px" }}>
            <div style={{ color: tc.text, fontWeight: 700, fontSize: 14, marginBottom: 10 }}>הכנס קוד חבר</div>
            <div style={{ display: "flex", gap: 8 }}>
              <input value={friendCode} onChange={e => { setFriendCode(e.target.value.toUpperCase()); setCodeResult(null); }}
                placeholder="XXXXXX" maxLength={6}
                style={{ flex: 1, padding: "11px 14px", background: tc.bgInput, border: `1px solid ${codeResult === "notfound" ? "#ef4444" : codeResult === "sent" ? "#22c55e" : tc.border}`, borderRadius: 10, color: tc.text, fontSize: 16, fontFamily: "monospace", letterSpacing: 4, textAlign: "center", direction: "ltr" }} />
              <button onClick={handleSendCode} disabled={friendCode.length < 6}
                style={{ padding: "11px 16px", background: friendCode.length >= 6 ? "linear-gradient(135deg,#3b82f6,#8b5cf6)" : tc.bgInput, border: "none", borderRadius: 10, color: friendCode.length >= 6 ? "#fff" : tc.textSub, fontWeight: 700, fontSize: 14, cursor: friendCode.length >= 6 ? "pointer" : "not-allowed" }}>
                שלח
              </button>
            </div>
            {codeResult === "sent" && (
              <div style={{ marginTop: 10, color: "#22c55e", fontSize: 13, fontWeight: 600 }}>✅ בקשת חברות נשלחה!</div>
            )}
            {codeResult === "notfound" && (
              <div style={{ marginTop: 10, color: "#ef4444", fontSize: 13 }}>⚠️ קוד לא נמצא — בדוק שוב</div>
            )}
          </div>

          {/* Contacts */}
          <div style={{ background: tc.bgCard, border: `1px solid ${tc.border}`, borderRadius: 14, padding: "16px" }}>
            <div style={{ color: tc.text, fontWeight: 700, fontSize: 14, marginBottom: 6 }}>📱 ייבא מאנשי קשר</div>
            <div style={{ color: tc.textSub, fontSize: 12, marginBottom: 12 }}>מצא חברים שכבר משתמשים ב-MeetUp</div>
            {contactsStatus === null && (
              <button onClick={handleRequestContacts}
                style={{ width: "100%", padding: "11px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 10, color: tc.text, fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
                🔍 סרוק אנשי קשר
              </button>
            )}
            {contactsStatus === "loading" && (
              <div style={{ color: tc.textSub, fontSize: 13, textAlign: "center", padding: "10px 0" }}>סורק...</div>
            )}
            {contactsStatus === "denied" && (
              <div style={{ color: "#f59e0b", fontSize: 13 }}>⚠️ הגישה לאנשי קשר נדחתה. ניתן לשנות בהגדרות הטלפון.</div>
            )}
            {contactsStatus === "done" && contactMatches.length === 0 && (
              <div style={{ color: tc.textSub, fontSize: 13, textAlign: "center", padding: "10px 0" }}>לא נמצאו חברים מאנשי הקשר שלך באפליקציה</div>
            )}
            {contactsStatus === "done" && contactMatches.map(c => (
              <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 12, marginTop: 8 }}>
                <Avatar initial={c.initial} size={40} />
                <div style={{ flex: 1 }}>
                  <div style={{ color: tc.text, fontWeight: 700, fontSize: 14 }}>{c.name}</div>
                  {c.phone && <div style={{ color: tc.textSub, fontSize: 12 }}>{c.phone}</div>}
                </div>
                <button style={{ padding: "7px 14px", background: "linear-gradient(135deg,#3b82f6,#8b5cf6)", border: "none", borderRadius: 8, color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>הוסף</button>
              </div>
            ))}
          </div>

          {/* Sent requests */}
          {sentRequests.length > 0 && (
            <div style={{ background: tc.bgCard, border: `1px solid ${tc.border}`, borderRadius: 14, padding: "14px 16px" }}>
              <div style={{ color: tc.textSub, fontWeight: 700, fontSize: 13, marginBottom: 8 }}>📤 בקשות שנשלחו</div>
              {sentRequests.map((r, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0" }}>
                  <span style={{ color: tc.text, fontSize: 14 }}>קוד: {r.code}</span>
                  <span style={{ color: "#f59e0b", fontSize: 12 }}>ממתין...</span>
                </div>
              ))}
            </div>
          )}

          {/* Suggestions */}
          <div style={{ marginTop: 4 }}>
            <div style={{ color: tc.text, fontWeight: 700, fontSize: 15, marginBottom: 12 }}>💡 אנשים שאולי תכיר</div>
            <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
              {["הכל", "קרבה", "נושאים"].map(f => (
                <button key={f} onClick={() => setFilterSuggestions(f)}
                  style={{ flex: 1, padding: "8px", borderRadius: 10, border: `2px solid ${filterSuggestions === f ? "#3b82f6" : tc.border}`, background: filterSuggestions === f ? "#1e3a5f" : tc.bgCard, color: filterSuggestions === f ? "#60a5fa" : tc.textSub, fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
                  {f === "קרבה" ? "📍 קרבה" : f === "נושאים" ? "🎯 נושאים" : "🔀 הכל"}
                </button>
              ))}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {filteredSuggestions.map(s => (
                <div key={s.id} style={{ background: tc.bgCard, border: `1px solid ${tc.border}`, borderRadius: 14, padding: "14px 16px", display: "flex", alignItems: "center", gap: 12 }}>
                  <Avatar initial={s.initial} size={44} />
                  <div style={{ flex: 1 }}>
                    <div style={{ color: tc.text, fontWeight: 700, fontSize: 15 }}>{s.name}</div>
                    <div style={{ color: tc.textSub, fontSize: 12, marginTop: 2 }}>
                      📍 {s.distance}
                      {s.mutual > 0 && <span style={{ marginRight: 8 }}>• {s.mutual} חברים משותפים</span>}
                    </div>
                    <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginTop: 6 }}>
                      {s.sports.map(sp => (
                        <span key={sp} style={{ padding: "2px 8px", background: "#1e3a5f", borderRadius: 10, color: "#60a5fa", fontSize: 11, fontWeight: 600 }}>{sp}</span>
                      ))}
                    </div>
                  </div>
                  <button
                    onClick={() => setSentRequests(prev => prev.some(r => r.id === s.id) ? prev : [...prev, { id: s.id }])}
                    style={{ padding: "8px 14px", background: sentRequests.some(r => r.id === s.id) ? "#14532d" : "linear-gradient(135deg,#3b82f6,#8b5cf6)", border: "none", borderRadius: 10, color: sentRequests.some(r => r.id === s.id) ? "#22c55e" : "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer", flexShrink: 0 }}>
                    {sentRequests.some(r => r.id === s.id) ? "✓ נשלח" : "הוסף"}
                  </button>
                </div>
              ))}
            </div>
          </div>
        </div>

// ─── STATS ───────────────────────────────────────────────────────────────────
function StatsPage({ language, tc }) {
  const t = TRANSLATIONS[language] || TRANSLATIONS["עברית"];
  const dir = language === "English" ? "ltr" : "rtl";
  const [tab, setTab] = useState("attendance");

  const tabs = [
    { id: "attendance", label: "🏆 נוכחות" },
    { id: "initiated", label: "📅 יוזם פגישות" },
    { id: "newMeetings", label: "🤝 הכרויות" },
  ];

  const sorted = [...STATS].sort((a, b) => b[tab] - a[tab]);

  const medalColor = i => i === 0 ? "#f59e0b" : i === 1 ? "#94a3b8" : i === 2 ? "#cd7f32" : tc.textMuted;
  const medal = i => i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `#${i+1}`;

  const barValue = s => tab === "attendance"
    ? Math.round((s.attended / s.total) * 100)
    : tab === "initiated"
    ? Math.round((s.initiated / 10) * 100)
    : Math.round((s.newMeetings / 10) * 100);

  const barLabel = s => tab === "attendance"
    ? `${s.attended}/${s.total} פגישות • ${s.cancelled} ביטולים`
    : tab === "initiated"
    ? `${s.initiated} פגישות ביזם`
    : `${s.newMeetings} הכרויות חדשות`;

  return (
    <div style={{ direction: dir }}>
      <h2 style={{ color: tc.text, fontWeight: 800, fontSize: 22, marginBottom: 6 }}>{t.statsTitle}</h2>
      <p style={{ color: tc.textSub, fontSize: 13, marginBottom: 18 }}>{t.statsSubtitle}</p>

      {/* Tab selector */}
      <div style={{ display: "flex", gap: 0, marginBottom: 20, background: tc.bgInput, borderRadius: 12, padding: 4 }}>
        {tabs.map(({ id, label }) => (
          <button key={id} onClick={() => setTab(id)}
            style={{ flex: 1, padding: "9px 4px", borderRadius: 9, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 12,
              background: tab === id ? "linear-gradient(135deg,#3b82f6,#8b5cf6)" : "transparent",
              color: tab === id ? "#fff" : tc.textSub, transition: "all 0.2s" }}>
            {label}
          </button>
        ))}
      </div>

      {/* Leaderboard */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {sorted.map((s, i) => (
          <div key={s.friend} style={{ background: tc.bgCard, border: `1px solid ${i === 0 ? "#f59e0b40" : tc.border}`, borderRadius: 14, padding: "14px 16px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
              <span style={{ fontSize: i < 3 ? 22 : 14, fontWeight: 800, color: medalColor(i), minWidth: 28, textAlign: "center" }}>{medal(i)}</span>
              <Avatar initial={s.initial} size={36} />
              <div style={{ flex: 1 }}>
                <div style={{ color: tc.text, fontWeight: 700, fontSize: 14 }}>{s.friend}</div>
                <div style={{ color: tc.textSub, fontSize: 12 }}>{barLabel(s)}</div>
              </div>
              <div style={{ color: tab === "attendance" && s.cancelled === 0 ? "#22c55e" : tc.textSub, fontWeight: 800, fontSize: 18 }}>
                {tab === "attendance" ? `${Math.round((s.attended / s.total) * 100)}%` : tab === "initiated" ? s.initiated : s.newMeetings}
              </div>
            </div>
            <div style={{ background: tc.bgInput, borderRadius: 6, height: 8, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${barValue(s)}%`, background: i === 0 ? "linear-gradient(90deg,#f59e0b,#f97316)" : "linear-gradient(90deg,#3b82f6,#8b5cf6)", borderRadius: 6, transition: "width 0.4s" }} />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

  return (
    <div style={{ direction: dir }}>
      <h2 style={{ color: tc.text, fontWeight: 800, fontSize: 22, marginBottom: 22 }}>{t.profile}</h2>
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12, marginBottom: 24, padding: "26px", background: tc.bgCard, borderRadius: 18, border: `1px solid ${tc.border}` }}>

        {/* Photo upload */}
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
          <div style={{ position: "relative" }}>
            <Avatar initial={user.name[0] || "א"} size={80} photo={user.photo} />
            <div style={{ position: "absolute", bottom: 0, right: 0, width: 24, height: 24, borderRadius: "50%", background: "#3b82f6", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, boxShadow: "0 2px 6px rgba(0,0,0,0.4)", pointerEvents: "none" }}>📷</div>
          </div>
          <label style={{
            display: "inline-flex", alignItems: "center", gap: 6,
            padding: "8px 18px", background: "linear-gradient(135deg,#3b82f6,#8b5cf6)",
            borderRadius: 10, cursor: "pointer", color: "#fff", fontSize: 13, fontWeight: 700,
            boxShadow: "0 2px 8px rgba(59,130,246,0.3)"
          }}>
            📷 {t.clickToChange}
            <input
              type="file"
              accept="image/*"
              onChange={handlePhotoChange}
              style={{ display: "none" }}
            />
          </label>
          {user.photo && (
            <button onClick={() => user.setPhoto(null)}
              style={{ padding: "4px 12px", background: "#450a0a", border: "1px solid #7f1d1d", borderRadius: 8, color: "#ef4444", fontSize: 11, cursor: "pointer" }}>
              {t.removePhoto}
            </button>
          )}
        </div>

        {editing ? (
          <div style={{ width: "100%", display: "flex", flexDirection: "column", gap: 10 }}>
            <div>
              <label style={{ color: tc.textSub, fontSize: 12, display: "block", marginBottom: 5 }}>{t.fullName}</label>
              <input value={tempName} onChange={e => setTempName(e.target.value)}
                style={{ width: "100%", padding: "10px 14px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 10, color: tc.text, fontSize: 14, direction: dir, boxSizing: "border-box" }} />
            </div>
            <div>
              <label style={{ color: tc.textSub, fontSize: 12, display: "block", marginBottom: 5 }}>{t.email}</label>
              <input value={tempEmail} onChange={e => setTempEmail(e.target.value)}
                style={{ width: "100%", padding: "10px 14px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 10, color: tc.text, fontSize: 14, direction: "ltr", boxSizing: "border-box" }} />
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={async () => {
                user.setName(tempName); user.setEmail(tempEmail); setEditing(false);
                if (user.supabaseId) {
                  await supabase.from("profiles").upsert({ id: user.supabaseId, full_name: tempName, email: tempEmail });
                }
              }}
                style={{ flex: 1, padding: "10px", background: "linear-gradient(135deg,#3b82f6,#8b5cf6)", border: "none", borderRadius: 10, color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>{t.save}</button>
              <button onClick={() => { setTempName(user.name); setTempEmail(user.email); setEditing(false); }}
                style={{ flex: 1, padding: "10px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 10, color: tc.textSub, fontWeight: 600, fontSize: 13, cursor: "pointer" }}>{t.cancel}</button>
            </div>
          </div>
        ) : (
          <>
            <div style={{ color: tc.text, fontWeight: 800, fontSize: 22 }}>{user.name}</div>
            <div style={{ color: tc.textSub, fontSize: 13 }}>{user.email}</div>
            <button onClick={() => { setTempName(user.name); setTempEmail(user.email); setEditing(true); }}
              style={{ padding: "8px 22px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 10, color: tc.textSub, fontSize: 13, cursor: "pointer" }}>{t.editProfile}</button>
          </>
        )}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        {[[t.meetingsCreated, "12", "#3b82f6"], [t.meetingsAttended, "18", "#8b5cf6"], [t.friendsCount, "5", "#22c55e"], [t.cancellations, "1", "#ef4444"]].map(([label, val, color]) => (
          <div key={label} style={{ background: tc.bgCard, border: `1px solid ${tc.border}`, borderRadius: 12, padding: "16px", textAlign: "center" }}>
            <div style={{ color, fontWeight: 800, fontSize: 28 }}>{val}</div>
            <div style={{ color: tc.textSub, fontSize: 12, marginTop: 4 }}>{label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function SettingsPage({ settings, tc }) {
  const { notifications, setNotifications, calendarSync, setCalendarSync, privacy, setPrivacy, theme, setTheme, language, setLanguage } = settings;
  const t = TRANSLATIONS[language] || TRANSLATIONS["עברית"];
  const dir = language === "العربية" ? "rtl" : language === "English" ? "ltr" : "rtl";
  const [expandedSection, setExpandedSection] = useState(null);
  const [modal, setModal] = useState(null); // "password" | "devices" | "logout"
  const [oldPw, setOldPw] = useState(""); const [newPw, setNewPw] = useState(""); const [confirmPw, setConfirmPw] = useState("");
  const [pwSaved, setPwSaved] = useState(false);

  const Toggle = ({ value, onToggle }) => (
    <div onClick={onToggle} style={{
      width: 44, height: 24, borderRadius: 12, cursor: "pointer", transition: "background 0.2s",
      background: value ? "#3b82f6" : tc.bgInput, border: `2px solid ${value ? "#3b82f6" : tc.border}`,
      position: "relative", flexShrink: 0,
    }}>
      <div style={{
        width: 16, height: 16, borderRadius: "50%", background: "#fff", position: "absolute",
        top: 2, left: value ? 22 : 2, transition: "left 0.2s",
      }} />
    </div>
  );

  const Modal = ({ children }) => (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ background: tc.bgCard, border: `1px solid ${tc.border}`, borderRadius: 18, padding: 24, width: "100%", maxWidth: 360, direction: dir }}>
        {children}
      </div>
    </div>
  );

  return (
    <div style={{ direction: dir }}>
      <h2 style={{ color: tc.text, fontWeight: 800, fontSize: 22, marginBottom: 18 }}>{t.settingsTitle}</h2>

      {/* Password modal */}
      {modal === "password" && (
        <Modal>
          <div style={{ color: tc.text, fontWeight: 800, fontSize: 18, marginBottom: 16 }}>🔑 {t.changePasswordTitle}</div>
          {pwSaved ? (
            <div style={{ textAlign: "center", padding: "20px 0" }}>
              <div style={{ fontSize: 40, marginBottom: 10 }}>✅</div>
              <div style={{ color: "#22c55e", fontWeight: 700 }}>{language === "English" ? "Password updated!" : language === "العربية" ? "تم تحديث كلمة المرور!" : "הסיסמה עודכנה!"}</div>
              <button onClick={() => { setModal(null); setPwSaved(false); setOldPw(""); setNewPw(""); setConfirmPw(""); }}
                style={{ marginTop: 16, padding: "10px 28px", background: "linear-gradient(135deg,#3b82f6,#8b5cf6)", border: "none", borderRadius: 10, color: "#fff", fontWeight: 700, cursor: "pointer" }}>{t.cancel}</button>
            </div>
          ) : (
            <>
              {[t.currentPassword, t.newPassword, t.confirmPassword].map((label, i) => (
                <div key={i} style={{ marginBottom: 12 }}>
                  <label style={{ color: tc.textSub, fontSize: 12, display: "block", marginBottom: 4 }}>{label}</label>
                  <input type="password" value={i===0?oldPw:i===1?newPw:confirmPw} onChange={e=>{if(i===0)setOldPw(e.target.value);else if(i===1)setNewPw(e.target.value);else setConfirmPw(e.target.value);}}
                    style={{ width: "100%", padding: "10px 12px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 10, color: tc.text, fontSize: 14, boxSizing: "border-box", direction: "ltr" }} />
                </div>
              ))}
              <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                <button onClick={() => { if(newPw && newPw===confirmPw) setPwSaved(true); }}
                  disabled={!oldPw || !newPw || newPw !== confirmPw}
                  style={{ flex: 1, padding: "11px", background: oldPw && newPw && newPw===confirmPw ? "linear-gradient(135deg,#3b82f6,#8b5cf6)" : tc.bgInput, border: "none", borderRadius: 10, color: oldPw && newPw && newPw===confirmPw ? "#fff" : tc.textSub, fontWeight: 700, cursor: "pointer" }}>{t.update}</button>
                <button onClick={() => { setModal(null); setOldPw(""); setNewPw(""); setConfirmPw(""); }}
                  style={{ flex: 1, padding: "11px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 10, color: tc.textSub, fontWeight: 600, cursor: "pointer" }}>{t.cancel}</button>
              </div>
            </>
          )}
        </Modal>
      )}

      {/* Devices modal */}
      {modal === "devices" && (
        <Modal>
          <div style={{ color: tc.text, fontWeight: 800, fontSize: 18, marginBottom: 16 }}>📱 {t.devicesTitle}</div>
          {[
            { name: t.thisDevice, icon: "📱", active: true },
            { name: "iPhone 14 Pro", icon: "📱", active: false },

          ].map((d, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderBottom: i < 2 ? `1px solid ${tc.border}` : "none" }}>
              <span style={{ fontSize: 22 }}>{d.icon}</span>
              <div style={{ flex: 1 }}>
                <div style={{ color: tc.text, fontWeight: 600, fontSize: 14 }}>{d.name}</div>
                {d.active && <div style={{ color: "#22c55e", fontSize: 11 }}>● {language === "English" ? "Active now" : language === "العربية" ? "نشط الآن" : "פעיל עכשיו"}</div>}
              </div>
              {!d.active && <button style={{ padding: "5px 12px", background: "#450a0a", border: "1px solid #7f1d1d", borderRadius: 8, color: "#ef4444", fontSize: 12, cursor: "pointer" }}>{t.removeDevice}</button>}
            </div>
          ))}
          <button onClick={() => setModal(null)}
            style={{ marginTop: 16, width: "100%", padding: "11px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 10, color: tc.textSub, fontWeight: 600, cursor: "pointer" }}>{t.cancel}</button>
        </Modal>
      )}

      {/* Logout confirm modal */}
      {modal === "logout" && (
        <Modal>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 44, marginBottom: 12 }}>🚪</div>
            <div style={{ color: tc.text, fontWeight: 700, fontSize: 17, marginBottom: 20 }}>{t.logoutConfirm}</div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setModal(null)}
                style={{ flex: 1, padding: "12px", background: tc.bgInput, border: `1px solid ${tc.border}`, borderRadius: 10, color: tc.textSub, fontWeight: 700, cursor: "pointer" }}>{t.no}</button>
              <button onClick={() => { setModal(null); settings.onLogout && settings.onLogout(); }}
                style={{ flex: 1, padding: "12px", background: "#450a0a", border: "1px solid #7f1d1d", borderRadius: 10, color: "#ef4444", fontWeight: 700, cursor: "pointer" }}>{t.yes}</button>
            </div>
          </div>
        </Modal>
      )}

      {/* Notifications */}
      <div style={{ background: tc.bgCard, border: `1px solid ${tc.border}`, borderRadius: 12, padding: "14px 16px", marginBottom: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 20 }}>🔔</span>
          <div style={{ flex: 1, color: tc.text, fontSize: 14, fontWeight: 600 }}>{t.notifications}</div>
          <div style={{ color: tc.textSub, fontSize: 13, marginLeft: 10 }}>{notifications ? t.active : t.off}</div>
          <Toggle value={notifications} onToggle={() => setNotifications(v => !v)} />
        </div>
      </div>

      {/* Calendar sync */}
      <div style={{ background: tc.bgCard, border: `1px solid ${tc.border}`, borderRadius: 12, padding: "14px 16px", marginBottom: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 20 }}>📅</span>
          <div style={{ flex: 1, color: tc.text, fontSize: 14, fontWeight: 600 }}>{t.calendarBackup}</div>
          <div style={{ color: tc.textSub, fontSize: 13, marginLeft: 10 }}>{calendarSync ? "Google Calendar" : t.off}</div>
          <Toggle value={calendarSync} onToggle={() => setCalendarSync(v => !v)} />
        </div>
      </div>

      {/* Privacy */}
      <div style={{ background: tc.bgCard, border: `1px solid ${tc.border}`, borderRadius: 12, padding: "14px 16px", marginBottom: 10 }}>
        <div onClick={() => setExpandedSection(expandedSection === "privacy" ? null : "privacy")}
          style={{ display: "flex", alignItems: "center", gap: 12, cursor: "pointer" }}>
          <span style={{ fontSize: 20 }}>🔒</span>
          <div style={{ flex: 1, color: tc.text, fontSize: 14, fontWeight: 600 }}>{t.privacy}</div>
          <div style={{ color: tc.textSub, fontSize: 13 }}>{ privacy === "כולם" ? t.everyone : privacy === "חברים בלבד" ? t.friendsOnly : privacy === "אני בלבד" ? t.onlyMe : privacy }</div>
          <span style={{ color: tc.textMuted, fontSize: 14, transition: "transform 0.2s", display: "inline-block", transform: expandedSection === "privacy" ? "rotate(90deg)" : "none" }}>‹</span>
        </div>
        {expandedSection === "privacy" && (
          <div style={{ marginTop: 12, display: "flex", flexDirection: "column", gap: 6 }}>
            {[["כולם",t.everyone],["חברים בלבד",t.friendsOnly],["אני בלבד",t.onlyMe]].map(([val,opt]) => (
              <button key={val} onClick={() => { setPrivacy(val); setExpandedSection(null); }}
                style={{ padding: "10px 14px", borderRadius: 10, border: `2px solid ${privacy === val ? "#3b82f6" : tc.border}`, background: privacy === val ? "#1e3a5f" : tc.bg, color: privacy === val ? "#60a5fa" : tc.textSub, fontWeight: 600, fontSize: 13, cursor: "pointer", textAlign: dir === "ltr" ? "left" : "right" }}>
                {opt}

            ))}
          </div>

      </div>

      {/* Theme */}
      <div style={{ background: tc.bgCard, border: `1px solid ${tc.border}`, borderRadius: 12, padding: "14px 16px", marginBottom: 10 }}>
        <div onClick={() => setExpandedSection(expandedSection === "theme" ? null : "theme")}
          style={{ display: "flex", alignItems: "center", gap: 12, cursor: "pointer" }}>
          <span style={{ fontSize: 20 }}>🎨</span>
          <div style={{ flex: 1, color: tc.text, fontSize: 14, fontWeight: 600 }}>{t.theme}</div>
          <div style={{ color: tc.textSub, fontSize: 13 }}>{ theme === "כהה" ? t.dark : theme === "בהיר" ? t.light : t.auto }</div>
          <span style={{ color: tc.textMuted, fontSize: 14, display: "inline-block", transform: expandedSection === "theme" ? "rotate(90deg)" : "none" }}>‹</span>
        </div>

          <div style={{ marginTop: 12, display: "flex", gap: 8 }}>

          <span style={{ color: tc.textMuted, fontSize: 14, display: "inline-block", transform: expandedSection === "lang" ? "rotate(90deg)" : "none" }}>‹</span>

              <button key={opt} onClick={() => { setLanguage(opt); setExpandedSection(null); }}

      {/* Account management */}
      <div style={{ marginTop: 24 }}>
        <div style={{ color: tc.textMuted, fontSize: 11, marginBottom: 10, textAlign: "center" }}>{t.accountMgmt}</div>
        <button onClick={() => setModal("password")} style={{ width: "100%", padding: "12px", background: tc.bgCard, border: `1px solid ${tc.border}`, borderRadius: 12, color: tc.textSub, fontWeight: 600, fontSize: 14, cursor: "pointer", marginBottom: 8 }}>
          {t.changePassword}
        </button>
        <button onClick={() => setModal("devices")} style={{ width: "100%", padding: "12px", background: tc.bgCard, border: `1px solid ${tc.border}`, borderRadius: 12, color: tc.textSub, fontWeight: 600, fontSize: 14, cursor: "pointer", marginBottom: 8 }}>
          {t.connectedDevices}
        </button>
        <button onClick={() => setModal("logout")} style={{ width: "100%", padding: "12px", background: "#450a0a", border: "1px solid #7f1d1d", borderRadius: 12, color: "#ef4444", fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
          {t.logout}
        </button>
      </div>
    </div>
  );
}

// ─── THEME COLORS ────────────────────────────────────────────────────────────
function getThemeColors(theme) {
  if (theme === "בהיר") return {
    bg: "#f1f5f9", bgCard: "#ffffff", bgInput: "#e2e8f0",
    border: "#cbd5e1", text: "#0f172a", textSub: "#475569",
    textMuted: "#94a3b8", headerBg: "#f1f5f9ee", sidebarBg: "#ffffff",
  };
  if (theme === "אוטומטי") return {
    bg: "#111827", bgCard: "#1f2937", bgInput: "#374151",
    border: "#374151", text: "#f9fafb", textSub: "#9ca3af",
    textMuted: "#6b7280", headerBg: "#111827ee", sidebarBg: "#111827",
  };
  return {
    bg: "#020817", bgCard: "#0f172a", bgInput: "#1e293b",
    border: "#1e293b", text: "#f1f5f9", textSub: "#64748b",
    textMuted: "#475569", headerBg: "#020817dd", sidebarBg: "#0a0f1a",
  };
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("home");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [navState, setNavState] = useState({});

  // ── Supabase auth state ──
  const [authUser, setAuthUser] = useState(null);      // supabase user object
  const [authLoading, setAuthLoading] = useState(true); // checking session

  useEffect(() => {
    // Check existing session on mount
    supabase.auth.getSession().then(({ data: { session } }) => {
      setAuthUser(session?.user ?? null);
      setAuthLoading(false);
    });
    // Listen for auth changes (login, logout, token refresh)
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setAuthUser(session?.user ?? null);
    });
    return () => subscription.unsubscribe();
  }, []);

  // Load profile from Supabase
  const [profileData, setProfileData] = useState(null);
  useEffect(() => {
    if (!authUser) { setProfileData(null); return; }
    supabase.from("profiles").select("*").eq("id", authUser.id).single()
      .then(({ data }) => { if (data) setProfileData(data); });
  }, [authUser]);

  const handleLogout = useCallback(async () => {
    await supabase.auth.signOut();
    setPage("home");
  }, []);

  // ── shared user state (from profile or auth) ──
  const [userName, setUserName] = useState("");
  const [userEmail, setUserEmail] = useState("");
  const [userPhoto, setUserPhoto] = useState(null);

  // Sync from profile data when loaded
  useEffect(() => {
    if (profileData) {
      setUserName(profileData.full_name || "");
      setUserEmail(profileData.email || authUser?.email || "");
      setUserPhoto(profileData.photo_url || null);
    } else if (authUser) {
      setUserEmail(authUser.email || "");
    }
  }, [profileData, authUser]);

  const user = {
    name: userName, email: userEmail, photo: userPhoto,
    setName: setUserName, setEmail: setUserEmail, setPhoto: setUserPhoto,
    supabaseId: authUser?.id,
  };

  // ── shared settings state ──
  const [notifications, setNotifications] = useState(true);
  const [calendarSync, setCalendarSync] = useState(true);
  const [privacy, setPrivacy] = useState("חברים בלבד");
  const [theme, setTheme] = useState("כהה");
  const [language, setLanguage] = useState("עברית");
  const tc = getThemeColors(theme);

  const settings = { notifications, setNotifications, calendarSync, setCalendarSync, privacy, setPrivacy, theme, setTheme, language, setLanguage, onLogout: handleLogout };

  // ── Show auth screen if not logged in ──
  if (authLoading) {
    return (
      <div style={{ minHeight: "100vh", background: "#020817", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ color: "#3b82f6", fontWeight: 800, fontSize: 22, letterSpacing: 2, animation: "pulse 1.5s infinite" }}>MeetUp...</div>
      </div>
    );
  }

  if (!authUser) {
    return <AuthScreen onAuth={setAuthUser} />;
  }

  // navigate to a subpage with data
  const navigate = (target, data = {}) => {
    setNavState(data);
    setPage(target);
  };

  const goBack = (target = "home") => setPage(target);

  const renderPage = () => {
    switch (page) {
      case "home": return <HomePage setPage={setPage} user={user} language={language} tc={tc} />;
      case "create": return <CreateMeetingPage language={language} tc={tc} />;
      case "meetings": return <MeetingsPage language={language} tc={tc} />;
      case "friends": return <FriendsPage navigate={navigate} language={language} tc={tc} />;
      case "stats": return <StatsPage language={language} tc={tc} />;
      case "business": return <BusinessPage navigate={navigate} language={language} tc={tc} />;
      case "settings": return <SettingsPage settings={settings} tc={tc} />;
      case "profile": return <ProfilePage user={user} language={language} tc={tc} />;
      case "friendProfile": return (
        <FriendProfilePage
          friend={navState.friend}
          onBack={() => goBack("friends")}
          onChat={() => navigate("friendChat", { friend: navState.friend })}
        />
      );
      case "friendChat": return (
        <ChatView
          name={navState.friend?.name}
          initial={navState.friend?.initial}
          messages={FRIEND_CHAT_MESSAGES[navState.friend?.id] || []}
          onBack={() => navigate("friendProfile", { friend: navState.friend })}
        />
      );
      case "businessProfile": return (
        <BusinessProfilePage
          business={navState.business}
          onBack={() => goBack("business")}
          onChat={() => navigate("businessChat", { business: navState.business })}
          onBook={() => navigate("bookAppointment", { business: navState.business })}
        />
      );
      case "businessChat": return (
        <ChatView
          name={navState.business?.name}
          initial={navState.business?.initial}
          gradient="linear-gradient(135deg,#1e40af,#7c3aed)"
          messages={BUSINESS_CHAT_MESSAGES[navState.business?.id] || []}
          onBack={() => navigate("businessProfile", { business: navState.business })}
        />
      );
      case "bookAppointment": return (
        <AppointmentBooking
          business={navState.business}
          onBack={() => navigate("businessProfile", { business: navState.business })}
        />
      );
      default: return <HomePage setPage={setPage} user={user} language={language} tc={tc} />;
    }
  };

  const mainPages = ["home", "create", "meetings", "friends", "stats", "business", "settings", "profile"];
  const currentMainPage = mainPages.includes(page) ? page : null;

  return (
    <div style={{ minHeight: "100vh", background: tc.bg, fontFamily: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif", transition: "background 0.3s" }}>
      <Sidebar page={currentMainPage} setPage={setPage} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} user={user} language={language} tc={tc} />
      <header style={{ position: "sticky", top: 0, zIndex: 30, background: tc.headerBg, backdropFilter: "blur(14px)", borderBottom: `1px solid ${tc.border}`, padding: "14px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", direction: "rtl" }}>
        <div style={{ color: "#3b82f6", fontWeight: 800, fontSize: 20, letterSpacing: 1 }}>MeetUp</div>
        <button onClick={() => setSidebarOpen(true)} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", gap: 5, padding: 4 }}>
          {[0, 1, 2].map(i => <div key={i} style={{ width: 22, height: 2, background: "#94a3b8", borderRadius: 2 }} />)}
        </button>
      </header>
      <main style={{ padding: "24px 20px 48px", maxWidth: 600, margin: "0 auto" }}>
        {renderPage()}
      </main>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
